# Development stack. Distinct project name so it can run side-by-side with the
# production stack (docker-compose.yml) on the same host without clobbering it.
#
# Usage:
#   sudo docker compose -f docker-compose-dev.yml up --build -d
name: bridgecare-backend-dev

services:
  nginx:
    image: nginx:1.27-alpine
    restart: always
    volumes:
      - ./static:/code/static
      - ./media:/code/media
      - ./nginx-dev/:/etc/nginx/conf.d

    ports:
      - "8091:80"
    deploy:
      resources:
        limits:
          cpus: "0.40"
          memory: 512M
    depends_on:
      - main-dev

  main-dev:
    image: &image bridgecare-backend-dev
    build: .
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    restart: always
    command:
      [
        "uvicorn",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--workers",
        "2",
        "--log-level",
        "info",
        "config.asgi:application",
      ]
    volumes: &volumes
      - /var/run/docker.sock:/var/run/docker.sock
      - ./static:/code/static
      - ./media:/code/media
    env_file: &env_file ./.docker.env
    depends_on:
      - redis-dev
      # - db

  # db:
  #   image: postgres:16-alpine
  #   command: postgres -N 568
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data/
  #   environment:
  #     - POSTGRES_DB=bridgecare
  #     - POSTGRES_USER=postgres
  #     - POSTGRES_PASSWORD=admin
  #     - PGDATA=/var/lib/postgresql/data/

  redis-dev:
    restart: always
    image: redis:7-alpine
    command: redis-server --loglevel warning
    volumes:
      # Separate data dir from prod's redis so the two instances don't corrupt
      # each other's RDB/AOF when both stacks run on the same host.
      - ./redis_data_dev:/data
    deploy:
      resources:
        limits:
          memory: 1G

  celery-beat-dev:
    image: *image
    restart: unless-stopped
    env_file: *env_file
    command:
      [
        "celery",
        "-A",
        "config",
        "beat",
        "-l",
        "info",
        "--scheduler",
        "django_celery_beat.schedulers:DatabaseScheduler",
      ]
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    volumes: *volumes
    depends_on:
      - redis-dev
      # - db

  migration-dev:
    image: *image
    env_file: *env_file
    command: /bin/sh -c 'python manage.py migrate && python manage.py collectstatic --noinput && python manage.py seed_db'
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 256M
    volumes: *volumes
    depends_on:
      - redis-dev
      # - db

  celery-worker-dev:
    image: *image
    restart: unless-stopped
    env_file: *env_file
    command:
      ["celery", "-A", "config", "worker", "-l", "DEBUG", "--concurrency", "3"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.4"
          memory: 768M
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
    volumes: *volumes
    depends_on:
      - redis-dev
      # - db

volumes:
  postgres_data:
